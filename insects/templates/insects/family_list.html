{% extends 'insects/base.html' %}

{% block content %}
<div class="list-container" style="max-width: 800px; margin: 40px auto; padding: 0 20px;">
    
    <a href="{% url 'order_list' %}" style="display: inline-block; margin-bottom: 15px; color: #666; text-decoration: none; font-weight: bold;">&larr; Back to All Orders</a>
    
    <h2 style="color: #1a3c15; border-bottom: 2px solid #2d5a27; padding-bottom: 10px;">Families in Order: {{ order_name }}</h2>
    
    <div class="vertical-list" style="margin-top: 20px;">
        {% for item in families %}
        <a href="{% url 'species_grid' item.slug %}" class="list-item" style="display: flex; justify-content: space-between; align-items: center; padding: 20px; background: white; margin-bottom: 15px; border-radius: 8px; text-decoration: none; color: #333; border-left: 5px solid #2d5a27; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: transform 0.2s;">
            <div>
                <h3 style="margin: 0 0 5px 0; color: #1a3c15;">{{ item.name }}</h3>
            </div>
            <div style="color: #2d5a27; font-weight: bold;">View Species &rarr;</div>
        </a>
        {% empty %}
        <div style="padding: 20px; text-align: center; color: #666; background: white; border-radius: 8px;">No families currently cataloged for this order.</div>
        {% endfor %}
    </div>
</div>
{% endblock %}
